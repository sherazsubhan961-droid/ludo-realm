<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Realm Elite | Premium Arcade Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #060b13; overflow-x: hidden; }
        .game-heading { font-family: 'Fredoka One', cursive; }
        .board-wrapper {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }
        /* Glassmorphism card effects */
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        /* Ambient neon glow behind the board */
        .neon-glow {
            box-shadow: 0 0 40px rgba(234, 88, 12, 0.15), 0 0 80px rgba(37, 99, 235, 0.1);
        }
        /* Fullscreen continuous animation canvas */
        #bgAnimationCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .relative-content { position: relative; z-index: 10; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between selection:bg-amber-500 selection:text-slate-900">

    <canvas id="bgAnimationCanvas"></canvas>

    <header class="glass-panel px-4 py-4 sticky top-0 z-50 relative-content">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-amber-500 to-rose-500 p-2 rounded-xl text-lg shadow-lg shadow-orange-500/20">🎲</div>
                <h1 class="game-heading text-xl md:text-2xl tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-rose-400 to-emerald-400">
                    LUDO REALM <span class="text-xs text-slate-400 uppercase font-bold tracking-widest pl-1">Elite</span>
                </h1>
            </div>
            <div id="netBadge" class="bg-amber-500/10 border border-amber-500/20 text-amber-400 px-4 py-1.5 rounded-full text-xs font-bold tracking-wider uppercase">
                ⚡ Initializing Engine
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto w-full px-4 py-8 flex-grow flex flex-col items-center justify-center relative-content">
        
        <div id="lobbyView" class="w-full max-w-sm glass-panel rounded-3xl p-6 shadow-2xl space-y-6">
            <div class="text-center space-y-1">
                <h2 class="game-heading text-xl text-slate-200 tracking-wide">Battle Arena Gate</h2>
                <p class="text-xs text-slate-400">Generate a custom ID or enter your friend's room code.</p>
            </div>

            <div class="space-y-3">
                <button onclick="hostNewRoom()" class="w-full bg-gradient-to-r from-amber-500 via-orange-500 to-rose-500 text-slate-950 font-black text-xs uppercase tracking-widest py-4 rounded-xl shadow-lg hover:opacity-95 active:scale-[0.99] transition cursor-pointer">
                    Host Premium Match
                </button>
                
                <div class="relative flex py-1 items-center">
                    <div class="flex-grow border-t border-slate-800"></div>
                    <span class="flex-shrink mx-3 text-[10px] font-bold text-slate-500 tracking-widest uppercase">OR</span>
                    <div class="flex-grow border-t border-slate-800"></div>
                </div>

                <div class="flex gap-2">
                    <input type="text" id="joinIDInput" placeholder="ENTER 6-DIGIT ID" class="w-full bg-slate-950/80 border border-slate-800 rounded-xl px-3 py-3 text-center text-xs font-bold text-amber-400 tracking-widest uppercase focus:outline-none focus:border-amber-500">
                    <button onclick="connectToRoom()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black px-5 rounded-xl text-xs uppercase tracking-wider active:scale-95 transition cursor-pointer">
                        Join
                    </button>
                </div>
            </div>
        </div>

        <div id="matchView" class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-12 gap-8 items-center hidden">
            
            <div class="md:col-span-7 glass-panel p-4 rounded-3xl shadow-2xl neon-glow">
                <div class="board-wrapper">
                    <canvas id="ludoBoardCanvas" class="w-full h-full rounded-2xl bg-slate-950 shadow-inner"></canvas>
                </div>
            </div>

            <div class="md:col-span-5 space-y-4 w-full">
                <div class="glass-panel p-6 rounded-3xl text-center space-y-6 shadow-2xl">
                    <div>
                        <span class="text-xs uppercase tracking-widest font-bold text-slate-400">Lobby Code ID</span>
                        <div id="roomDisplay" class="text-3xl font-black text-amber-400 game-heading tracking-widest mt-1">------</div>
                    </div>

                    <div class="flex justify-center py-2">
                        <div id="diceCube" class="w-24 h-24 bg-gradient-to-br from-slate-900 to-slate-950 rounded-2xl flex items-center justify-center text-5xl text-amber-400 font-black border-2 border-slate-700 shadow-2xl shadow-amber-500/10 select-none tracking-tight">
                            1
                        </div>
                    </div>

                    <button id="rollButton" onclick="triggerDiceRollAction()" class="w-full bg-gradient-to-r from-rose-500 via-orange-500 to-amber-500 text-slate-950 font-black text-xs uppercase tracking-widest py-4 rounded-xl shadow-xl hover:opacity-95 transition transform active:scale-95 cursor-pointer">
                        🎲 Roll Arena Dice
                    </button>
                    
                    <div id="turnBadge" class="text-xs text-emerald-400 font-bold bg-emerald-500/10 border border-emerald-500/20 py-2 rounded-xl tracking-wide uppercase">
                        Establishing Peer Gateway Network Link...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="glass-panel text-center py-4 text-xs text-slate-500 font-medium tracking-wide relative-content">
        Ludo Realm Elite Studio Node • Enhanced Vector Render Loop
    </footer>

    <script>
        // --- SECTION 1: BACKGROUND PARTICLES ANIMS ---
        const bgCanvas = document.getElementById('bgAnimationCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];

        function resizeBgCanvas() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeBgCanvas);
        resizeBgCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * bgCanvas.width;
                this.y = Math.random() * bgCanvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.alpha = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > bgCanvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > bgCanvas.height) this.speedY *= -1;
            }
            draw() {
                bgCtx.save();
                bgCtx.globalAlpha = this.alpha;
                bgCtx.fillStyle = '#f59e0b';
                bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.restore();
            }
        }

        for (let i = 0; i < 45; i++) { particles.push(new Particle()); }

        function renderBgLoop() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            // Ambient faint radial dark vignette background fill
            let grad = bgCtx.createRadialGradient(bgCanvas.width/2, bgCanvas.height/2, 10, bgCanvas.width/2, bgCanvas.height/2, bgCanvas.width);
            grad.addColorStop(0, '#0d1527');
            grad.addColorStop(1, '#050811');
            bgCtx.fillStyle = grad;
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(renderBgLoop);
        }
        renderBgLoop();


        // --- SECTION 2: HIGH-GRAPHICS LUDO BOARD SYSTEM ---
        let peer = null, connection = null, myTurn = false;
        const canvas = document.getElementById('ludoBoardCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 800;

        function drawEnhancedLudoBoard() {
            ctx.clearRect(0, 0, 800, 800);
            const step = 800 / 15;

            // Palette Definition Array
            const colors = {
                red: '#ef4444', redDark: '#b91c1c', redLight: '#fca5a5',
                green: '#10b981', greenDark: '#047857', greenLight: '#6ee7b7',
                blue: '#3b82f6', blueDark: '#1d4ed8', blueLight: '#93c5fd',
                yellow: '#f59e0b', yellowDark: '#b45309', yellowLight: '#fde047',
                track: '#131e31', line: '#22324d', bg: '#090f1a'
            };

            // 1. Core Background board plate
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, 800, 800);

            // Helper function for Base Home Zones
            function drawHomeQuarter(x, y, baseColor, accentColor) {
                ctx.fillStyle = baseColor;
                ctx.fillRect(x, y, step*6, step*6);
                
                // Outer clean frame border line
                ctx.strokeStyle = colors.line;
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, step*6, step*6);

                // Internal white pocket inner plate
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.roundRect(x + step, y + step, step*4, step*4, 24);
                ctx.fill();

                // Generate 4 classic baseline coin container token circles
                const positions = [
                    {x: x + step*2, y: y + step*2}, {x: x + step*4, y: y + step*2},
                    {x: x + step*2, y: y + step*4}, {x: x + step*4, y: y + step*4}
                ];
                positions.forEach(pos => {
                    ctx.fillStyle = accentColor;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, step*0.6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = colors.bg;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                });
            }

            // Draw Quadrant Bases
            drawHomeQuarter(0, 0, colors.red, colors.redDark);
            drawHomeQuarter(step*9, 0, colors.green, colors.greenDark);
            drawHomeQuarter(0, step*9, colors.blue, colors.blueDark);
            drawHomeQuarter(step*9, step*9, colors.yellow, colors.yellowDark);

            // 2. Render Central Victory Triangles
            const center = 800 / 2;
            ctx.lineWidth = 2;
            
            ctx.fillStyle = colors.red; ctx.beginPath(); ctx.moveTo(step*6, step*6); ctx.lineTo(center, center); ctx.lineTo(step*6, step*9); ctx.fill();
            ctx.fillStyle = colors.green; ctx.beginPath(); ctx.moveTo(step*6, step*6); ctx.lineTo(center, center); ctx.lineTo(step*9
