<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Realm Express | Live Synchronized Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- PeerJS Library for true serverless live real-time web sync -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; }
        .game-heading { font-family: 'Fredoka One', cursive; }
        /* Forces the canvas element to stay perfectly square regardless of display orientation */
        .board-wrapper {
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between selection:bg-amber-500 selection:text-slate-900">

    <!-- HEADER STATUS BLOCK -->
    <header class="bg-slate-900/90 backdrop-blur border-b border-slate-800 px-4 py-3 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl">🎲</span>
                <h1 class="game-heading text-lg md:text-xl tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-rose-400">
                    LUDO REALM
                </h1>
            </div>
            <div id="netBadge" class="bg-amber-500/10 border border-amber-500/20 text-amber-400 px-3 py-1 rounded-full text-[11px] font-bold tracking-wider uppercase">
                ⚡ Initializing Engine
            </div>
        </div>
    </header>

    <!-- INTERACTION STAGE CONTAINER -->
    <main class="max-w-4xl mx-auto w-full px-4 py-6 flex-grow flex flex-col items-center justify-center">
        
        <!-- ROOM ROUTER GATEWAY PANEL -->
        <div id="lobbyView" class="w-full max-w-sm bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl space-y-6">
            <div class="text-center space-y-1">
                <h2 class="game-heading text-xl text-slate-200">Battle Multiplayer Gate</h2>
                <p class="text-xs text-slate-400">Generate a custom ID or enter your friend's room code.</p>
            </div>

            <div class="space-y-3">
                <button onclick="hostNewRoom()" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 font-black text-xs uppercase tracking-widest py-3.5 rounded-xl shadow-lg shadow-orange-500/10 active:scale-[0.99] transition cursor-pointer">
                    Host Match (Get ID)
                </button>
                
                <div class="relative flex py-1 items-center">
                    <div class="flex-grow border-t border-slate-800/80"></div>
                    <span class="flex-shrink mx-3 text-[10px] font-bold text-slate-500 tracking-widest uppercase">OR</span>
                    <div class="flex-grow border-t border-slate-800/80"></div>
                </div>

                <div class="flex gap-2">
                    <input type="text" id="joinIDInput" placeholder="ENTER 6-DIGIT ID" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-center text-xs font-bold text-amber-400 tracking-widest uppercase focus:outline-none focus:border-amber-500">
                    <button onclick="connectToRoom()" class="bg-emerald-500 text-slate-950 font-extrabold px-4 rounded-xl text-xs uppercase tracking-wider active:scale-95 transition cursor-pointer">
                        Join
                    </button>
                </div>
            </div>
        </div>

        <!-- LIVE MATCH INTERFACE (Hidden dynamically on launch) -->
        <div id="matchView" class="w-full max-w-3xl grid grid-cols-1 md:grid-cols-12 gap-6 items-center hidden">
            
            <!-- PERFECTLY RIGID LUDO CANVAS PANEL -->
            <div class="md:col-span-7 bg-slate-900 p-3 rounded-3xl border border-slate-800 shadow-xl">
                <div class="board-wrapper">
                    <canvas id="ludoBoardCanvas" class="w-full h-full rounded-xl bg-slate-950 shadow-inner"></canvas>
                </div>
            </div>

            <!-- MULTIPLAYER CONTROLLER DECKS -->
            <div class="md:col-span-5 space-y-4 w-full">
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl text-center space-y-4 shadow-xl">
                    <div>
                        <span class="text-[10px] uppercase tracking-widest font-bold text-slate-500">Lobby Code ID</span>
                        <div id="roomDisplay" class="text-2xl font-black text-amber-400 game-heading tracking-widest mt-0.5">------</div>
                    </div>

                    <!-- CENTRALIZED VIRTUAL DICE BOX -->
                    <div class="flex justify-center py-2">
                        <div id="diceCube" class="w-20 h-20 bg-gradient-to-br from-amber-400 to-amber-500 rounded-2xl flex items-center justify-center text-4xl text-slate-950 font-black border-4 border-slate-900 shadow-lg select-none">
                            1
                        </div>
                    </div>

                    <button id="rollButton" onclick="triggerDiceRollAction()" class="w-full bg-gradient-to-r from-rose-500 to-orange-500 text-white font-bold text-xs uppercase tracking-widest py-3.5 rounded-xl shadow-md transition transform active:scale-95 cursor-pointer">
                        🎲 Roll Live Dice
                    </button>
                    
                    <div id="turnBadge" class="text-[11px] text-emerald-400 font-bold bg-emerald-500/10 border border-emerald-500/20 py-1.5 rounded-lg tracking-wide">
                        Connecting peer links...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-950 text-center py-3 text-[10px] text-slate-600 font-medium tracking-wide">
        Ludo Realm Real-Time Mesh Canvas Engine
    </footer>

    <!-- REALTIME NETWORKING LOGIC CODES -->
    <script>
        let peer = null;
        let connection = null;
        let myTurn = false;
        const canvas = document.getElementById('ludoBoardCanvas');
        const ctx = canvas.getContext('2d');

        // Set high internal pixel scaling resolution to keep lines crisp on retina screens
        canvas.width = 600;
        canvas.height = 600;

        // Automatically compile canvas board layout vector shapes
        function renderLudoCanvasVectorLayout() {
            ctx.clearRect(0, 0, 600, 600);
            const step = 600 / 15;

            // Render Safe Quad bases
            ctx.fillStyle = "#dc2626"; ctx.fillRect(0, 0, step*6, step*6); // Red
            ctx.fillStyle = "#16a34a"; ctx.fillRect(step*9, 0, step*6, step*6); // Green
            ctx.fillStyle = "#2563eb"; ctx.fillRect(0, step*9, step*6, step*6); // Blue
            ctx.fillStyle = "#ca8a04"; ctx.fillRect(step*9, step*9, step*6, step*6); // Yellow

            // Render Center Core Home Triangles
            ctx.fillStyle = "#ea580c"; ctx.beginPath(); ctx.moveTo(step*6, step*6); ctx.lineTo(step*7.5, step*7.5); ctx.lineTo(step*6, step*9); ctx.fill();
            ctx.fillStyle = "#15803d"; ctx.beginPath(); ctx.moveTo(step*6, step*6); ctx.lineTo(step*7.5, step*7.5); ctx.lineTo(step*9, step*6); ctx.fill();
            ctx.fillStyle = "#1d4ed8"; ctx.beginPath(); ctx.moveTo(step*6, step*9); ctx.lineTo(step*7.5, step*7.5); ctx.lineTo(step*9, step*9); ctx.fill();
            ctx.fillStyle = "#b45309"; ctx.beginPath(); ctx.moveTo(step*9, step*6); ctx.lineTo(step*7.5, step*7.5); ctx.lineTo(step*9, step*9); ctx.fill();

            // Render Standard Pathway Tracks
            ctx.strokeStyle = "#334155";
            ctx.lineWidth = 1;
            for(let i=0; i<15; i++) {
                for(let j=0; j<15; j++) {
                    if((i>=6 && i<=8) || (j>=6 && j<=8)) {
                        if(i<6 || i>8 || j<6 || j>8) {
                            ctx.strokeRect(i*step, j*step, step, step);
                        }
                    }
                }
            }
        }

        // Initialize unique Peer profile layer 
        function initPeerNode(forcedID = null) {
            return new Promise((resolve) => {
                const targetID = forcedID || Math.random().toString(36).substring(2, 8).toUpperCase();
                peer = new Peer(`LUDO-${targetID}`);
                
                peer.on('open', () => {
                    document.getElementById('netBadge').innerText = "🟢 SERVER READY";
                    document.getElementById('netBadge').className = "bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-[11px] font-bold tracking-wider uppercase";
                    resolve(targetID);
                });

                peer.on('connection', (conn) => {
                    connection = conn;
                    setupNetworkDataListeners();
                    myTurn = true;
                    updateTurnDisplayStatus("Your Turn - Fire Away!");
                });
            });
        }

        async function hostNewRoom() {
            const roomCode = await initPeerNode();
            swapUIScreenLayout(roomCode);
            updateTurnDisplayStatus("Waiting for player to connect...");
        }

        async function connectToRoom() {
            const targetCode = document.getElementById('joinIDInput').value.trim().toUpperCase();
            if(!targetCode) return;
            
            await initPeerNode();
            connection = peer.connect(`LUDO-${targetCode}`);
            
            connection.on('open', () => {
                swapUIScreenLayout(targetCode);
                myTurn = false;
                updateTurnDisplayStatus("Opponent's Turn... Waiting");
                setupNetworkDataListeners();
            });
        }

        function setupNetworkDataListeners() {
            connection.on('data', (data) => {
                if(data.type === 'ROLL') {
                    document.getElementById('diceCube').innerText = data.val;
                    myTurn = true;
                    updateTurnDisplayStatus("Your Turn - Fire Away!");
                }
            });
        }

        function triggerDiceRollAction() {
            if(!connection) {
                Swal.fire({ icon: 'info', title: 'Single Player Mode', text: 'Connect an opponent to track real sync variables across devices!', background: '#1e293b', color: '#fff' });
                executeLocalRollArray();
                return;
            }
            if(!myTurn) {
                Swal.fire({ icon: 'warning', title: 'Hold Up!', text: 'Please wait for your opponent to complete their current action path.', background: '#1e293b', color: '#fff', timer: 1200, showConfirmButton: false });
                return;
            }

            const activeRollValue = executeLocalRollArray();
            connection.send({ type: 'ROLL', val: activeRollValue });
            myTurn = false;
            updateTurnDisplayStatus("Opponent's Turn... Waiting");
        }

        function executeLocalRollArray() {
            const rolled = Math.floor(Math.random() * 6) + 1;
            document.getElementById('diceCube').innerText = rolled;
            return rolled;
        }

        function swapUIScreenLayout(code) {
            document.getElementById('lobbyView').classList.add('hidden');
            document.getElementById('matchView').classList.remove('hidden');
            document.getElementById('roomDisplay').innerText = code;
            renderLudoCanvasVectorLayout();
        }

        function updateTurnDisplayStatus(msg) {
            document.getElementById('turnBadge').innerText = msg.toUpperCase();
        }

        // Prime the vector array layout upon immediate page setup bootstrap sequence
        renderLudoCanvasVectorLayout();
    </script>
</body>
</html>
